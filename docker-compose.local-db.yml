services:
  postgres:
    image: postgres:16
    container_name: soluciones-integrales-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: soluciones_integrales_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d soluciones_integrales_local"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - soluciones_integrales_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init/00-local-bootstrap.sql:/docker-entrypoint-initdb.d/00-local-bootstrap.sql:ro
      - ./supabase-schema.sql:/docker-entrypoint-initdb.d/10-supabase-schema.sql:ro
      - ./supabase-cms-schema.sql:/docker-entrypoint-initdb.d/20-supabase-cms-schema.sql:ro

  minio:
    image: quay.io/minio/minio:latest
    container_name: soluciones-integrales-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - soluciones_integrales_minio:/data

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: soluciones-integrales-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/images &&
      mc anonymous set public local/images
      "
    restart: "no"

volumes:
  soluciones_integrales_pgdata:
  soluciones_integrales_minio: